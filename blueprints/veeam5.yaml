spec_version: 2
description: >
  Deploy Veeam Backup & Replication 13.0.1 Software Appliance on VMware vSphere.
  Provisions the pre-configured Rocky Linux OVA (DISA STIG-hardened, secure-by-default),
  configures networking via the Startup Wizard, and validates readiness on port 443 (Web UI) and 10443 (Host Management).
  Delivers enterprise-grade backup, replication, and recovery for virtual,
  physical, and cloud environments — no Linux expertise required.

instructions:
  source:
    store: zt-test
    path: instructions/veeam.md

metadata:
  display-name: Veeam Software Appliance
  self-service: true
  blueprint-labels:
    - key: Provider
      value: Veeam
    - key: Category
      value: Storage
    - key: OS
      value: Rocky Linux DISA STIG
    - key: Validated
  icon:
    path: graphics/veeam.svg

labels:
  - Backup: Veeam
  - vSphere: ''
  - Hypervisor: vCenter
  - category: Applications
  - service-type: VMaaS

inputs:

  # ── Torque execution ─────────────────────────────────────────────────────────
  Target:
    description: vCenter credentials for the host that will run the Veeam appliance VM
    allowed-credential-providers:
      - vsphere
    type: credentials

  Management Server:
    description: Torque agent to use for Terraform execution
    type: agent

  Upstream DNS:
    display-name: Upstream DNS
    description: >
      DNS server that can resolve the vCenter hostname. Required when the
      Torque agent container cannot resolve private/internal domain names
      (e.g. 10.0.0.1 or 192.168.1.1). Leave empty to use the agent's
      default resolver.
    default: \"\"
    optional: true
    type: string

  # ── vCenter infrastructure (auto-populated) ─────────────────────────────────
  Datacenter:
    description: vCenter datacenter where the Veeam appliance VM will be deployed
    depends-on: Management Server, Target
    overrides:
      - agent_name: '{{ .inputs.[\"Management Server\"] }}'
      - credential_name: '{{ .inputs.Target }}'
      - resource_type: datacenter
    source-name: vcenter
    type: input-source

  Cluster:
    description: Cluster to deploy the Veeam appliance into
    depends-on: Management Server, Target, Datacenter
    overrides:
      - agent_name: '{{ .inputs.[\"Management Server\"] }}'
      - credential_name: '{{ .inputs.Target }}'
      - resource_type: cluster
      - filter_datacenter: '{{ .inputs.Datacenter }}'
    source-name: vcenter
    type: input-source

  Host:
    description: Specific ESXi host (leave empty for DRS auto-placement)
    depends-on: Management Server, Target, Datacenter
    overrides:
      - agent_name: '{{ .inputs.[\"Management Server\"] }}'
      - credential_name: '{{ .inputs.Target }}'
      - resource_type: host
      - filter_datacenter: '{{ .inputs.Datacenter }}'
    source-name: vcenter
    type: input-source
    optional: true
    default: \"\"

  Datastore:
    description: >
      Datastore for the Veeam appliance VM disks.
      Minimum 240 GB free space required (OS + Veeam binaries + configuration database).
    depends-on: Management Server, Target, Datacenter, Cluster
    overrides:
      - agent_name: '{{ .inputs.[\"Management Server\"] }}'
      - credential_name: '{{ .inputs.Target }}'
      - resource_type: datastore
      - filter_datacenter: '{{ .inputs.Datacenter }}'
      - filter_cluster: '{{ .inputs.Cluster }}'
    source-name: vcenter
    type: input-source

  Folder:
    description: VM folder path in vCenter (leave empty for datacenter root)
    depends-on: Management Server, Target, Datacenter
    overrides:
      - agent_name: '{{ .inputs.[\"Management Server\"] }}'
      - credential_name: '{{ .inputs.Target }}'
      - resource_type: vm-folder-path
      - filter_datacenter: '{{ .inputs.Datacenter }}'
    source-name: vcenter
    type: input-source
    optional: true
    default: \"\"

  Port Group:
    display-name: Port Group
    description: Network port group to attach the Veeam appliance NIC to
    depends-on: Management Server, Target, Datacenter
    overrides:
      - agent_name: '{{ .inputs.[\"Management Server\"] }}'
      - credential_name: '{{ .inputs.Target }}'
      - resource_type: network
      - filter_datacenter: '{{ .inputs.Datacenter }}'
    source-name: vcenter
    type: input-source

  # ── Virtual machine ──────────────────────────────────────────────────────────
  VM Name:
    description: Display name for the Veeam appliance VM in vCenter
    default: veeam-backup
    type: string

  # ── Static IP assignment ──────────────────────────────────────────────────────
  # The wizard automation configures static IP during the Startup Wizard.
  # No DHCP helper VM is required.

  VM IP:
    display-name: Veeam Appliance IP
    description: >
      Static IPv4 address to assign to the Veeam appliance.
      The Startup Wizard automation will configure this address on the appliance
      during first boot.
    default: \"\"
    pattern: ^(\\d{1,3}\\.){3}\\d{1,3}$
    validation-description: Enter a valid IPv4 address
    type: string

  VM Netmask:
    display-name: Subnet Mask
    description: Subnet mask for the network (e.g. 255.255.255.0 for /24).
    default: \"255.255.255.0\"
    type: string

  VM Gateway:
    display-name: Default Gateway
    description: Default gateway IPv4 address for the Veeam appliance.
    default: \"\"
    pattern: ^(\\d{1,3}\\.){3}\\d{1,3}$
    validation-description: Enter a valid IPv4 gateway address
    type: string

  VM DNS:
    display-name: DNS Server
    description: Primary DNS server IPv4 address for the Veeam appliance.
    default: \"\"
    pattern: ^(\\d{1,3}\\.){3}\\d{1,3}$
    validation-description: Enter a valid IPv4 DNS address
    type: string

  VM Hostname:
    display-name: Appliance Hostname
    description: >
      Short hostname for the Veeam appliance (e.g. vbr-prod01).
      Will be configured in the Startup Wizard. Leave empty to keep the
      auto-generated hostname from the OVA.
    default: \"\"
    optional: true
    type: string

  NTP Server:
    display-name: NTP Server
    description: NTP server hostname or IP for time synchronisation.
    default: \"time.nist.gov\"
    optional: true
    type: string

  # ── Veeam DISA STIG credentials ───────────────────────────────────────────────
  Admin Password:
    display-name: Host Administrator Password
    description: >
      Password for the Veeam Host Administrator account set during the Startup Wizard.
      DISA STIG rules: ≥15 chars · uppercase · lowercase · digit · special character ·
      no 4+ identical chars in a row · no 5+ chars of the same class in a row.
      Must differ from the Security Officer Password.
      See https://vee.am/hm-stig-password for full requirements.
    sensitive: true
    type: string
    pattern: >-
      ^(?=.{15,})(?=.*[A-Z])(?=.*[a-z])(?=.*\\d)(?=.*[^A-Za-z0-9])(?!.*(.)\\1{3})(?!.*[a-z]{5})(?!.*[A-Z]{5})(?!.*\\d{5})(?!.*[^A-Za-z0-9]{5}).+$
    validation-description: >-
      Password must be ≥15 characters and include uppercase, lowercase, digit, and special
      character. No character may repeat 4+ times in a row, and no single character class
      (lower/upper/digit/special) may appear 5+ times consecutively.
      Example: Tr0ub4dor&3xPass!

  Security Officer Password:
    display-name: Security Officer Password
    description: >
      Password for the Veeam Security Officer account set during the Startup Wizard.
      Same DISA STIG rules as the Host Administrator Password.
      IMPORTANT: Must be different from the Host Administrator Password — using the same
      password for both roles will cause the deployment to fail.
      See https://vee.am/hm-stig-password for full requirements.
    sensitive: true
    type: string
    pattern: >-
      ^(?=.{15,})(?=.*[A-Z])(?=.*[a-z])(?=.*\\d)(?=.*[^A-Za-z0-9])(?!.*(.)\\1{3})(?!.*[a-z]{5})(?!.*[A-Z]{5})(?!.*\\d{5})(?!.*[^A-Za-z0-9]{5}).+$
    validation-description: >-
      Password must be ≥15 characters and include uppercase, lowercase, digit, and special
      character. No character may repeat 4+ times in a row, and no single character class
      (lower/upper/digit/special) may appear 5+ times consecutively.
      IMPORTANT: Must be different from the Host Administrator Password.
      Example: Sec0ff!cer@Veeam1

  HTTP Proxy:
    display-name: HTTP Proxy
    description: >
      HTTP/HTTPS proxy URL for outbound traffic from the appliance
      (e.g. http://proxy.corp.example.com:8080). Leave empty for direct access.
    pattern: '^$|^https?://((\\d{1,3}\\.){3}\\d{1,3}|[a-zA-Z0-9]([a-zA-Z0-9\\-]{0,61}[a-zA-Z0-9])?(\\.[a-zA-Z0-9]([a-zA-Z0-9\\-]{0,61}[a-zA-Z0-9])?)*)(:\\d{1,5})?$'
    optional: true
    type: string

  No Proxy:
    display-name: No Proxy Hosts
    description: >
      Comma-separated hosts, IPs, or CIDRs that bypass the proxy
      (e.g. localhost,127.0.0.1,10.0.0.0/8). Ignored when HTTP Proxy is empty.
    default: \"localhost,127.0.0.1\"
    pattern: '^.*$'
    type: string

outputs:
  Veeam Web UI:
    quick: true
    value: 'https://{{ .inputs.[\"VM IP\"] }}:443'
  Veeam Host Management:
    quick: true
    value: 'https://{{ .inputs.[\"VM IP\"] }}:10443'
  VM IP:
    quick: true
    value: '{{ .inputs.[\"VM IP\"] }}'
  VM Name:
    value: '{{ .grains[\"veeam-vm\"].outputs.vm_name }}'
  Admin Username:
    value: admin
  Admin Password:
    value: '{{ .inputs.[\"Admin Password\"] }}'
  Veeam Version:
    value: '13.0.1.2067'
  vCenter Version:
    value: '{{ .grains[\"preflight-detect\"].outputs.vcenter_version }}'

grains:

  # ── Step 1a: Detect vCenter version via REST API ──────────────────────────────
  preflight-detect:
    kind: terraform
    spec:
      source:
        store: zt-test
        path: assets/terraform/vcenter-preflight
      agent:
        name: '{{ .inputs.[\"Management Server\"] }}'
      authentication:
        - '{{ .inputs.Target }}'
      env-vars:
        - VSPHERE_ALLOW_UNVERIFIED_SSL: 'true'
      scripts:
        pre-tf-init:
          source:
            store: zt-test
            path: assets/shell/configure-dns.sh
          arguments: '{{ .inputs.[\"Upstream DNS\"] }}'
      outputs:
        - vcenter_version
      tags:
        auto-tag: false

  # ── Step 1b: Validate vCenter >= 7.0 (Veeam 13 requirement) ─────────────────
  preflight-validate:
    depends-on: preflight-detect
    kind: shell
    spec:
      agent:
        name: '{{ .inputs.[\"Management Server\"] }}'
      env-vars:
        - DETECTED_VERSION: '{{ .grains[\"preflight-detect\"].outputs.vcenter_version }}'
        - MIN_VERSION: \"7.0.0\"
        - ADMIN_PASS: '{{ .inputs.[\"Admin Password\"] }}'
        - SECOFFICER_PASS: '{{ .inputs.[\"Security Officer Password\"] }}'
      activities:
        deploy:
          commands:
            - |
              set -e
              echo \"==============================================================\"
              echo \"  Veeam Pre-flight: vCenter Version Check\"
              echo \"==============================================================\"
              echo \"  Detected  : $DETECTED_VERSION\"
              echo \"  Required  : $MIN_VERSION or later\"
              echo \"\"

              # Parse detected version (strip any build/patch suffix after third component)
              DET_MAJOR=$(echo \"$DETECTED_VERSION\" | cut -d. -f1)
              DET_MINOR=$(echo \"$DETECTED_VERSION\" | cut -d. -f2)
              DET_PATCH=$(echo \"$DETECTED_VERSION\" | cut -d. -f3 | cut -d- -f1)
              DET_PATCH=${DET_PATCH:-0}

              # Parse minimum version
              MIN_MAJOR=$(echo \"$MIN_VERSION\" | cut -d. -f1)
              MIN_MINOR=$(echo \"$MIN_VERSION\" | cut -d. -f2)
              MIN_PATCH=$(echo \"$MIN_VERSION\" | cut -d. -f3 | cut -d- -f1)
              MIN_PATCH=${MIN_PATCH:-0}

              # Weighted numeric comparison (major*10000 + minor*100 + patch)
              DETECTED=$((DET_MAJOR * 10000 + DET_MINOR * 100 + DET_PATCH))
              REQUIRED=$((MIN_MAJOR * 10000 + MIN_MINOR * 100 + MIN_PATCH))

              if [ \"$DETECTED\" -lt \"$REQUIRED\" ]; then
                echo \"================================================================\"
                echo \" PREFLIGHT FAILED: vCenter version is too old for Veeam 13\"
                echo \"================================================================\"
                echo \"\"
                echo \" Detected:  $DETECTED_VERSION\"
                echo \" Required:  $MIN_VERSION or later\"
                echo \"\"
                echo \" Veeam Backup & Replication 13 requires vSphere 7.0 or above.\"
                echo \" Please upgrade your vSphere environment before retrying.\"
                echo \"================================================================\"
                exit 1
              fi

              echo \"OK — vCenter $DETECTED_VERSION meets the minimum\"
              echo \"     requirement of $MIN_VERSION. Proceeding with deployment.\"
              echo \"==============================================================\"

              # ── Password uniqueness check ──────────────────────────────────
              echo \"\"
              echo \"==============================================================\"
              echo \"  Veeam Pre-flight: Password Uniqueness Check\"
              echo \"==============================================================\"
              if [ \"$ADMIN_PASS\" = \"$SECOFFICER_PASS\" ]; then
                echo \"\"
                echo \"================================================================\"
                echo \" PREFLIGHT FAILED: Passwords must be different\"
                echo \"================================================================\"
                echo \"\"
                echo \" The Host Administrator Password and the Security Officer\"
                echo \" Password must not be the same.\"
                echo \"\"
                echo \" Please re-launch with two distinct passwords.\"
                echo \"================================================================\"
                exit 1
              fi
              echo \"OK — Host Administrator and Security Officer passwords differ.\"
              echo \"==============================================================\"

  # ── Step 2: Extend vCenter NFC lease timeout ────────────────────────────────
  # The Veeam OVA is ~20 GB (two disks). Uploading it over a WAN link to vCenter
  # can exceed vSphere's default httpNfcLeaseTimeout of 300s (5 min), causing a
  # 404 mid-upload. This grain bumps the timeout to 7200s (2 h) on every ESXi
  # host before the import begins, then resets it on teardown.
  vcenter-nfc-timeout:
    depends-on: preflight-validate
    kind: shell
    spec:
      agent:
        name: '{{ .inputs.[\"Management Server\"] }}'
      authentication:
        - '{{ .inputs.Target }}'
      env-vars:
        - VSPHERE_ALLOW_UNVERIFIED_SSL: 'true'
        - NFC_TIMEOUT_DEPLOY: '7200'
        - NFC_TIMEOUT_RESET: '300'
      activities:
        deploy:
          commands:
            - |
              set -e
              echo \"==============================================================\"
              echo \"  vCenter NFC Lease Timeout — Extending to ${NFC_TIMEOUT_DEPLOY}s\"
              echo \"==============================================================\"
              echo \"\" | base64 -d > /tmp/vcenter-nfc-timeout.py
              python3 /tmp/vcenter-nfc-timeout.py
              echo \"  NFC lease timeout extended successfully.\"
        teardown:
          commands:
            - |
              set -e
              echo \"==============================================================\"
              echo \"  vCenter NFC Lease Timeout — Resetting to ${NFC_TIMEOUT_RESET}s\"
              echo \"==============================================================\"
              echo \"\" | base64 -d > /tmp/vcenter-nfc-timeout.py
              RESET=1 python3 /tmp/vcenter-nfc-timeout.py
              echo \"  NFC lease timeout reset successfully.\"

  # ── Step 3: Deploy Veeam Software Appliance OVA ─────────────────────────────
  # Downloads and deploys the pre-configured Rocky Linux OVA to vSphere.
  # Hardware: 8 vCPU | 16 GB RAM | 240 GB+ disk (per Veeam system requirements).
  # OS is pre-hardened per DISA STIG guidelines — no Linux expertise required.
  veeam-vm:
    depends-on: vcenter-nfc-timeout
    kind: terraform
    spec:
      inputs:
        - vm_name: '{{ .inputs.[\"VM Name\"] }}-{{ .envId }}'
        - ova_url: 'http://ec2-3-235-192-192.compute-1.amazonaws.com/VeeamSoftwareAppliance_13.0.1.2067_20260310new.ova'
        - port_group: '{{ .inputs.[\"Port Group\"] }}'
        - datacenter: '{{ .inputs.Datacenter }}'
        - cluster: '{{ .inputs.Cluster }}'
        - host: '{{ .inputs.Host }}'
        - datastore: '{{ .inputs.Datastore }}'
        - folder: '{{ .inputs.Folder }}'
        - network_mappings: 'VM Network: {{ .inputs.[\"Port Group\"] }}'
        - linux_user: veeamadmin
        - linux_password: '{{ .inputs.[\"Admin Password\"] }}'
        - disk_provisioning: thin
        - firmware: efi
        - wait_for_ip_timeout: 180
        - http_proxy: '{{ .inputs.[\"HTTP Proxy\"] }}'
        - https_proxy: '{{ .inputs.[\"HTTP Proxy\"] }}'
        - no_proxy: '{{ .inputs.[\"No Proxy\"] }}'
      outputs:
        - vm_name
        - vm_ip
        - vm_uuid
        - num_cpu
        - memory_mb
        - console_url
        - network_mode
      authentication:
        - '{{ .inputs.Target }}'
      agent:
        name: '{{ .inputs.[\"Management Server\"] }}'
      env-vars:
        - VSPHERE_ALLOW_UNVERIFIED_SSL: 'true'
      scripts:
        pre-tf-init:
          arguments: 'http://ec2-3-235-192-192.compute-1.amazonaws.com/VeeamSoftwareAppliance_13.0.1.2067_20260310new.ova {{ .inputs.[\"Upstream DNS\"] }}'
          source:
            path: assets/shell/download-ova.sh
            store: zt-test
      source:
        path: assets/terraform/vcenter-ova-vsphere
        store: zt-test
      tags:
        auto-tag: false

  # ── Step 4: Drive the Veeam Startup Wizard via VM console keystroke injection ─
  # The Veeam appliance blocks all services until its ncurses Startup Wizard
  # (veeam-mtui) is completed interactively. Since SSH is not available at this
  # stage, keystrokes are injected via the VMware PutUsbScanCodes SOAP API.
  # The wizard configures: hostname, static IP, timezone, NTP, Host Admin
  # password + TOTP, Security Officer password + TOTP, then triggers EULA accept.
  # DISA STIG passwords are validated BEFORE submission to prevent wizard failure.
  # TOTP secrets are captured from the QR code (screenshot + pyzbar decode) and
  # surfaced as Torque outputs so users can enrol their authenticator app.
  configure-veeam-wizard:
    depends-on: veeam-vm
    kind: shell
    spec:
      agent:
        name: '{{ .inputs.[\"Management Server\"] }}'
      authentication:
        - '{{ .inputs.Target }}'
      env-vars:
        - VSPHERE_ALLOW_UNVERIFIED_SSL: 'true'
        - VEEAM_VM_NAME: '{{ .grains[\"veeam-vm\"].outputs.vm_name }}'
        - VEEAM_HOSTNAME: '{{ .inputs.[\"VM Hostname\"] }}'
        - VEEAM_IP: '{{ .inputs.[\"VM IP\"] }}'
        - VEEAM_NETMASK: '{{ .inputs.[\"VM Netmask\"] }}'
        - VEEAM_GATEWAY: '{{ .inputs.[\"VM Gateway\"] }}'
        - VEEAM_DNS: '{{ .inputs.[\"VM DNS\"] }}'
        - VEEAM_NTP: '{{ .inputs.[\"NTP Server\"] }}'
        - VEEAM_ADMIN_PASS: '{{ .inputs.[\"Admin Password\"] }}'
        - VEEAM_SECOFFICER_PASS: '{{ .inputs.[\"Security Officer Password\"] }}'
        - VEEAM_DC_NAME: '{{ .inputs.Datacenter }}'
        - VEEAM_DS_NAME: '{ .inputs.Datastore }'
        - WIZARD_B64: 
      outputs:
        - totp_host_admin
        - totp_security_officer
      activities:
        deploy:
          commands:
            - |
              set -e
              log() { echo \"[$(date -u +%H:%M:%S)] $*\"; }

              log \"==============================================================\"
              log \"  Veeam Startup Wizard — Automated Console Configuration\"
              log \"  VM      : $VEEAM_VM_NAME\"
              log \"  IP      : $VEEAM_IP  /  GW: $VEEAM_GATEWAY\"
              log \"  NTP     : $VEEAM_NTP\"
              log \"==============================================================\"

              # ── DISA STIG password pre-flight ──────────────────────────────
              log \"Validating DISA STIG password requirements...\"
              python3 - <<'PYEOF'
              import os, re, sys

              def validate_stig_password(pwd, label):
                  errors = []
                  if len(pwd) < 15:
                      errors.append(f'Too short ({len(pwd)} chars, need >=15)')
                  if not re.search(r'[A-Z]', pwd):
                      errors.append('No uppercase letter')
                  if not re.search(r'[a-z]', pwd):
                      errors.append('No lowercase letter')
                  if not re.search(r'[0-9]', pwd):
                      errors.append('No digit')
                  if not re.search(r'[^A-Za-z0-9]', pwd):
                      errors.append('No special character')
                  if re.search(r'(.)\\1{3,}', pwd):
                      errors.append('4+ consecutive identical characters (maxrepeat=3)')
                  for cls_label, pat in [
                      ('lowercase',  r'[a-z]{5,}'),
                      ('uppercase',  r'[A-Z]{5,}'),
                      ('digit',      r'[0-9]{5,}'),
                      ('special',    r'[^A-Za-z0-9]{5,}'),
                  ]:
                      if re.search(pat, pwd):
                          errors.append(f'5+ consecutive {cls_label} characters (maxclassrepeat=4)')
                  return errors

              admin_pass = os.environ.get('VEEAM_ADMIN_PASS', '')
              sec_pass   = os.environ.get('VEEAM_SECOFFICER_PASS', '')
              failed = False

              for label, pwd in [('Host Administrator', admin_pass), ('Security Officer', sec_pass)]:
                  errs = validate_stig_password(pwd, label)
                  if errs:
                      print(f'ERROR: {label} password fails DISA STIG requirements:', file=sys.stderr)
                      for e in errs:
                          print(f'  - {e}', file=sys.stderr)
                      failed = True

              if admin_pass == sec_pass:
                  print('ERROR: Host Administrator and Security Officer passwords must be different.', file=sys.stderr)
                  failed = True

              if failed:
                  print('', file=sys.stderr)
                  print('Fix the passwords and re-launch the environment.', file=sys.stderr)
                  print('See https://vee.am/hm-stig-password for full rules.', file=sys.stderr)
                  sys.exit(1)

              print('  Password validation passed.')
              PYEOF

              # ── Install govc (console keystroke injection) ──────────────
              log \"Installing govc for console keystroke injection...\"
              if ! command -v govc &>/dev/null; then
                GOVC_VERSION=\"v0.35.0\"
                GOVC_TARBALL=\"govc_Linux_x86_64.tar.gz\"
                GOVC_URL_DL=\"https://github.com/vmware/govmomi/releases/download/${GOVC_VERSION}/${GOVC_TARBALL}\"
                GOVC_INSTALLED=0

                # Attempt 1: direct GitHub download (3 retries, fail on HTTP errors)
                log \"  Attempting GitHub download (${GOVC_URL_DL})...\"
                for _attempt in 1 2 3; do
                  if curl -fsSL --retry 2 --connect-timeout 15 --max-time 60 \\
                       \"$GOVC_URL_DL\" -o /tmp/govc.tar.gz 2>/tmp/govc_curl_err; then
                    if tar -xzf /tmp/govc.tar.gz -C /tmp govc 2>/dev/null; then
                      chmod +x /tmp/govc && mv /tmp/govc /usr/local/bin/govc
                      rm -f /tmp/govc.tar.gz
                      GOVC_INSTALLED=1
                      log \"  ✓ govc installed from GitHub (attempt ${_attempt})\"
                      break
                    else
                      log \"  [WARN] tar extraction failed on attempt ${_attempt} (curl exit 0 but bad content?)\"
                      rm -f /tmp/govc.tar.gz
                    fi
                  else
                    _curl_err=$(cat /tmp/govc_curl_err 2>/dev/null | head -3)
                    log \"  [WARN] curl attempt ${_attempt}/3 failed: ${_curl_err}\"
                    sleep 5
                  fi
                done

                # Attempt 2: pip install govc (pure-Python wrapper, works without binary)
                if [ \"${GOVC_INSTALLED}\" -eq 0 ]; then
                  log \"  GitHub download failed — trying: pip install govc...\"
                  if pip install --quiet --break-system-packages govc 2>/dev/null \\
                     || pip install --quiet govc 2>/dev/null; then
                    # pip govc installs a 'govc' console script; locate it
                    _govc_pip=$(python3 -c \"import shutil; print(shutil.which('govc') or '')\" 2>/dev/null)
                    if [ -n \"${_govc_pip}\" ] && \"${_govc_pip}\" version &>/dev/null; then
                      ln -sf \"${_govc_pip}\" /usr/local/bin/govc 2>/dev/null || true
                      GOVC_INSTALLED=1
                      log \"  ✓ govc installed via pip\"
                    fi
                  fi
                fi

                # Attempt 3: check common alternate paths (some base images ship govc)
                if [ \"${GOVC_INSTALLED}\" -eq 0 ]; then
                  for _p in /usr/bin/govc /opt/govc/govc /snap/bin/govc; do
                    if [ -x \"${_p}\" ]; then
                      ln -sf \"${_p}\" /usr/local/bin/govc 2>/dev/null || true
                      GOVC_INSTALLED=1
                      log \"  ✓ govc found at ${_p}\"
                      break
                    fi
                  done
                fi

                if [ \"${GOVC_INSTALLED}\" -eq 0 ]; then
                  log \"ERROR: All govc installation methods failed.\"
                  log \"  Network may be blocking GitHub. Pre-install govc on the runner image.\"
                  exit 1
                fi
              fi
              log \"  govc: $(govc version 2>&1 | head -1)\"

              # ── Export GOVC env vars for the wizard script ─────────────────
              export GOVC_URL=\"${VSPHERE_SERVER}\"
              export GOVC_USERNAME=\"${VSPHERE_USER}\"
              export GOVC_PASSWORD=\"${VSPHERE_PASSWORD}\"
              export GOVC_INSECURE=1
              export GOVC_DATACENTER=\"${VEEAM_DC_NAME}\"
              log \"  GOVC_URL=${GOVC_URL}  GOVC_DATACENTER=${GOVC_DATACENTER}\"

              # Verify govc can reach vCenter before starting the wizard
              log \"  Verifying vCenter connectivity via govc...\"
              govc about &>/dev/null || { log \"ERROR: govc cannot connect to vCenter (${VSPHERE_SERVER})\"; exit 1; }
              log \"  ✓ vCenter reachable\"

              # ── Install system dependencies for OCR + QR decode ───────────
              log \"Installing tesseract-ocr and libzbar0 (for MFA OCR and QR-code decode)...\"
              apt-get install -yq tesseract-ocr libzbar0 2>/dev/null || true

              # ── Install Python dependencies ────────────────────────────────
              log \"Installing Python dependencies (pyotp, pyzbar, opencv, Pillow, pytesseract, qrcode, requests)...\"
              pip install --quiet --break-system-packages pyotp pyzbar opencv-python-headless Pillow pytesseract qrcode requests 2>/dev/null \\
                || pip install --quiet pyotp pyzbar opencv-python-headless Pillow pytesseract qrcode requests 2>/dev/null \\
                || { log \"pip install failed — trying apt fallback...\"; apt-get install -yq python3-pil python3-pil.imagetk zbar-tools 2>/dev/null || true; pip install --quiet pyotp pytesseract qrcode requests 2>/dev/null || true; }

              # ── Decode wizard automation script (embedded — private repo) ─────
              log \"Extracting veeam-wizard.py (embedded base64)...\"
              printf '%s' \"$WIZARD_B64\" | base64 -d > /tmp/veeam-wizard.py

              # ── Run wizard (streams detailed progress to stdout) ──────────
              log \"Starting wizard automation (this takes 10-20 minutes)...\"
              # The script writes TOTP_HOST_ADMIN and TOTP_SECURITY_OFFICER
              # directly to $TORQUE_OUTPUTS (via --output-file).
              python3 /tmp/veeam-wizard.py \\
                --vm            \"$VEEAM_VM_NAME\" \\
                --hostname      \"$VEEAM_HOSTNAME\" \\
                --ip            \"$VEEAM_IP\" \\
                --netmask       \"$VEEAM_NETMASK\" \\
                --gateway       \"$VEEAM_GATEWAY\" \\
                --dns           \"$VEEAM_DNS\" \\
                --ntp           \"$VEEAM_NTP\" \\
                --admin-pass    \"$VEEAM_ADMIN_PASS\" \\
                --secofficer-pass \"$VEEAM_SECOFFICER_PASS\" \\
                ${TORQUE_OUTPUTS:+--output-file \"$TORQUE_OUTPUTS\"}

              # ── Map script output vars to grain output names ───────────────
              if [ -n \"${TORQUE_OUTPUTS:-}\" ]; then
                if grep -q \"TOTP_HOST_ADMIN=\" \"$TORQUE_OUTPUTS\" 2>/dev/null; then
                  # Rename keys to match declared grain outputs
                  sed -i 's/^TOTP_HOST_ADMIN=/totp_host_admin=/; s/^TOTP_SECURITY_OFFICER=/totp_security_officer=/' \"$TORQUE_OUTPUTS\"
                else
                  echo \"totp_host_admin=\" >> \"$TORQUE_OUTPUTS\"
                  echo \"totp_security_officer=\" >> \"$TORQUE_OUTPUTS\"
                fi
              else
                log \"WARN: TORQUE_OUTPUTS not set — TOTP values not written to grain outputs\"
              fi

              log \"Wizard automation complete.\"

  # ── Step 5: Wait for Veeam Web UI (HTTPS ports 443 and 10443) ────────────────
  # Polls the Veeam Web Console endpoint until it responds with an HTTP 2xx/3xx.
  # After the wizard completes the appliance goes through first-boot service
  # startup which takes 15-30 minutes.  Timeout is set to 45 minutes.
  veeam-ready:
    depends-on: configure-veeam-wizard
    kind: shell
    spec:
      agent:
        name: '{{ .inputs.[\"Management Server\"] }}'
      activities:
        deploy:
          commands:
            - |
              set -e
              log() { echo \"[$(date -u +%H:%M:%S)] $*\"; }

              VM_IP=\"{{ .inputs.[\"VM IP\"] }}\"

              log \"============================================================\"
              log \"  Veeam Backup & Replication 13.0.1 — Readiness Check\"
              log \"  Target IP          : $VM_IP\"
              log \"  Web UI (HTTPS)     : https://$VM_IP:443\"
              log \"  Host Management    : https://$VM_IP:10443\"
              log \"============================================================\"

              # Bypass proxy for direct VM health check
              export no_proxy=\"${no_proxy:+${no_proxy},}${VM_IP}\"
              export NO_PROXY=\"${NO_PROXY:+${NO_PROXY},}${VM_IP}\"

              # curl helper: returns the HTTP status code only (no double-zero bug).
              # When curl fails entirely (connect timeout / no route), HTTP_CODE is \"000\".
              # The old pattern `curl ... || echo \"000\"` produced \"000000\" because
              # %{http_code} already prints \"000\" on failure before the || fires.
              get_http_code() {
                local url=\"$1\"
                local code
                code=$(curl -s -o /dev/null -w \"%{http_code}\" \\
                  --connect-timeout 10 --max-time 20 \\
                  --noproxy \"$VM_IP\" -k \"$url\" 2>/dev/null)
                # Trim whitespace / extra chars; default to 000
                echo \"${code:-000}\"
              }

              # ── Phase 1: Wait for Host Management port 10443 (up to 45 min) ──
              log \"Phase 1: Waiting for Host Management port 10443 (up to 45 min)...\"
              MAX=180
              ATTEMPT=0
              while [ $ATTEMPT -lt $MAX ]; do
                ATTEMPT=$((ATTEMPT+1))
                log \"Attempt $ATTEMPT/$MAX — GET https://$VM_IP:10443\"

                HTTP_CODE=$(get_http_code \"https://$VM_IP:10443\")

                log \"HTTP status: $HTTP_CODE\"

                if echo \"$HTTP_CODE\" | grep -qE \"^(200|301|302|401|403)$\"; then
                  log \"  Host Management port 10443 is responding.\"
                  break
                fi

                if [ $ATTEMPT -eq $MAX ]; then
                  log \"ERROR: Host Management port 10443 did not respond after $((MAX*15))s\"
                  exit 1
                fi

                log \"Not ready yet — waiting 15s...\"
                sleep 15
              done

              # ── Phase 2: Wait for Web UI port 443 (up to 10 min) ─────────────
              log \"Phase 2: Waiting for Web UI port 443 (up to 10 min)...\"
              MAX=40
              ATTEMPT=0
              while [ $ATTEMPT -lt $MAX ]; do
                ATTEMPT=$((ATTEMPT+1))
                log \"Attempt $ATTEMPT/$MAX — GET https://$VM_IP:443\"

                HTTP_CODE=$(get_http_code \"https://$VM_IP:443\")

                log \"HTTP status: $HTTP_CODE\"

                if echo \"$HTTP_CODE\" | grep -qE \"^(200|301|302|401|403)$\"; then
                  log \"\"
                  log \"============================================================\"
                  log \"  Veeam Backup & Replication is ready!\"
                  log \"\"
                  log \"  Web UI          : https://$VM_IP:443\"
                  log \"  Host Management : https://$VM_IP:10443\"
                  log \"  Login           : admin / <your Host Administrator Password>\"
                  log \"\"
                  log \"  Your TOTP secrets are in the environment outputs.\"
                  log \"  Scan them into Google Authenticator before logging in.\"
                  log \"============================================================\"
                  exit 0
                fi

                log \"Not ready yet — waiting 15s...\"
                sleep 15
              done

              log \"ERROR: Veeam Web UI did not become available after $((MAX*15))s\"
              log \"Check that the VM is powered on and the network is reachable.\"
              exit 1

customization:
  launch-form:
    steps:
      tags:
        visible: false
      workflows:
        visible: false
      ownersAndCollaborators:
        visible: false
    sections:
      - name: Infrastructure
        inputs:
          - name: Datacenter
          - name: Cluster
          - name: Host
          - name: Datastore
          - name: Folder
      - name: Virtual Machine
        inputs:
          - name: Port Group
          - name: VM Name
      - name: Network
        inputs:
          - name: VM IP
          - name: VM Netmask
          - name: VM Gateway
          - name: VM DNS
          - name: VM Hostname
          - name: NTP Server
      - name: Proxy Settings
        inputs:
          - name: HTTP Proxy
          - name: No Proxy
      - name: Credentials
        inputs:
          - name: Admin Password
          - name: Security Officer Password

  layout:
    cards:
      - name: stack1
        display_name: Overview
        type: stack-card
        height: 4
        items:
          - name: veeam_status
            display_name: '{{ environment.name }}'
            status: >-
              {% if environment.status == \"Active\" %}positive
              {% elsif environment.status == \"Ended\" or environment.status == \"Force Ended\" %}inactive
              {% elsif environment.status == \"Launching\" or environment.status == \"Terminating\" or environment.status == \"Updating\" %}info
              {% else %}warning{% endif %}
            type: icon-card
            image: https://raw.githubusercontent.com/carlosteclas/assets/refs/heads/main/graphics/veeam.svg
            data:
              - name: Target
                value: '{{ inputs.Target }}'
              - name: Version
                value: '13.0.1.2067'
              - name: Platform
                value: VMware vSphere
          - name: drift
            display_name: Deployment Drift
            type: drift-card
            height: 1.6
            grains:
              - veeam-vm

      - name: details
        display_name: Access Details
        type: data-card
        height: 2.8
        data:
          - name: Veeam Web UI
            action:
              icon: Link
              label: Open
              url: '{{ outputs[\"Veeam Web UI\"] }}'
            value: '{{ outputs[\"Veeam Web UI\"] }}'
          - name: Veeam Host Management
            action:
              icon: Link
              label: Open
              url: '{{ outputs[\"Veeam Host Management\"] }}'
            value: '{{ outputs[\"Veeam Host Management\"] }}'
          - name: VM IP
            value: '{{ outputs[\"VM IP\"] }}'
          - name: Admin Username
            value: '{{ outputs[\"Admin Username\"] }}'
          - name: Admin Password
            value: '{{ outputs[\"Admin Password\"] }}'

      - name: Solution
        type: blueprint-card
        height: 2.8
        size: 2.1
        blueprint: '{{ environment.blueprint.name }}'

      - name: compute
        display_name: Appliance Resources
        type: resource-card
        height: 2
        size: 4
        items:
          - name: Veeam Version
            icon: Globe
            value: '{{ outputs[\"Veeam Version\"] }}'
          - name: VM Name
            icon: Server
            value: '{{ outputs[\"VM Name\"] }}'
          - name: vCenter Version
            icon: Server
            value: '{{ outputs[\"vCenter Version\"] }}'

    exclude:
      grains:
        - preflight-detect
        - preflight-validate
        - vcenter-nfc-timeout
        - veeam-vm
        - configure-veeam-wizard
        - veeam-ready
